version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: bugtracker-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 10

  discovery-service:
    build: ./Discovery-Service
    container_name: discovery-service
    ports:
      - "8761:8761"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/eureka/apps"]
      interval: 15s
      timeout: 5s
      retries: 10

  api-gateway:
    build: ./API-GateWay
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      discovery-service:
        condition: service_healthy

  user-auth-service:
    build: ./User-Auth-Service
    container_name: user-auth-service
    ports:
      - "8081:8081"
    depends_on:
      discovery-service:
        condition: service_healthy
      mysql:
        condition: service_healthy

  bug-service:
    build: ./Bug-Service
    container_name: bug-service
    ports:
      - "8082:8082"
    depends_on:
      discovery-service:
        condition: service_healthy
      mysql:
        condition: service_healthy

  project-service:
    build: ./Project-Service
    container_name: project-service
    ports:
      - "8083:8083"
    depends_on:
      discovery-service:
        condition: service_healthy
      mysql:
        condition: service_healthy

  notification-service:
    build: ./Notification-Service
    container_name: notification-service
    ports:
      - "8084:8084"
    depends_on:
      discovery-service:
        condition: service_healthy
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
